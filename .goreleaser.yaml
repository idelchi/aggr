version: 2

gitlab_urls:
  api: https://gitlab.garfield-labs.com/api/v4/
  download: https://gitlab.garfield-labs.com

  use_package_registry: false
  use_job_token: true

release:
  prerelease: auto

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0

    goos:
      - linux
      - windows
      - darwin

    goarch:
      - 386
      - amd64
      - arm
      - arm64

    goarm:
      - 6
      - 7
    ignore:
      - goos: windows
        goarch: arm
      - goos: windows
        goarch: arm64
      - goos: windows
        goarch: 386

archives:
  - formats:
      - tar.gz
    name_template: >-
      {{ .Binary }}_
      {{- .Os }}_
      {{- if eq .Arch "386" }}x86
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    # use zip for windows archives
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - none*

snapshot:
  version_template: "{{ .Version }}"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
